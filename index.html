<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
            <h1>Formulário de Cadastro</h1>
            <div>
                <label for="nome">Nome</label>
                <input id="nome" required name="nome" type="text">
            </div>
            <div>
                <label for="email">Email</label>
                <input id="email" required name="email" type="email">
            </div>
            <div>
                <label for="telefone">Telefone</label>
                <input id="telefone" required name="telefone" type="text">
            </div>
            <div>
                <label for="senha">Senha</label>
                <input id="senha" required name="senha" type="password">
            </div>
            <button id="botao">Criar conta</button>
            <p id="alerta"></p>
        </main>
        
    <script type="module" src="script.js"></script>
</body>
</html>
